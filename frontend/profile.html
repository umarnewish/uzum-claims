<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Профиль продавца — Компенсации</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
<div id="app-page" style="display:flex;min-height:100vh;">
  <aside class="sidebar">
    <div class="sidebar-logo">Компенс<span>ации</span></div>
    <nav>
      <a class="sidebar-link" href="/">Главная</a>
      <a class="sidebar-link active" href="/profile">Профиль</a>
      <a class="sidebar-link" href="/losses">Утери</a>
      <a class="sidebar-link" href="/new-claim">Новая претензия</a>
      <a class="sidebar-link" href="/claims">История</a>
    </nav>
  </aside>

  <main class="main-content">
    <div class="claims-shell">
      <h1 class="page-title">Профиль продавца</h1>
      <p class="lead" id="status">Загрузка…</p>

      <div class="card">
        <form id="profile-form" autocomplete="off">
          <h2>Лицо</h2>
          <div class="form-grid">
            <div class="field">
              <label for="fld-fio">ФИО <span class="req">*</span></label>
              <input id="fld-fio" type="text" name="fio" required placeholder="Абдурахимов Фозил Тошкулович" />
            </div>
            <div class="field">
              <label for="fld-legal_form">Юр. форма <span class="req">*</span></label>
              <input id="fld-legal_form" type="text" name="legal_form" required placeholder="ООО" />
            </div>
          </div>
          <div class="form-grid full">
            <div class="field">
              <label for="fld-legal_name">Юр. название <span class="req">*</span></label>
              <input id="fld-legal_name" type="text" name="legal_name" required placeholder="ALFA POLIMER LINE" />
            </div>
          </div>
          <div class="form-grid">
            <div class="field">
              <label for="fld-inn">ИНН <span class="req">*</span></label>
              <input id="fld-inn" type="text" name="inn" required />
            </div>
            <div class="field">
              <label for="fld-oked">ОКЭД</label>
              <input id="fld-oked" type="text" name="oked" />
            </div>
          </div>

          <h2>Банк</h2>
          <div class="form-grid">
            <div class="field">
              <label for="fld-bank_account">Расчётный счёт <span class="req">*</span></label>
              <input id="fld-bank_account" type="text" name="bank_account" required />
            </div>
            <div class="field">
              <label for="fld-mfo">МФО <span class="req">*</span></label>
              <input id="fld-mfo" type="text" name="mfo" required />
            </div>
          </div>
          <div class="form-grid full">
            <div class="field">
              <label for="fld-bank_name">Название банка <span class="req">*</span></label>
              <input id="fld-bank_name" type="text" name="bank_name" required />
            </div>
          </div>

          <h2>Адрес</h2>
          <div class="form-grid full">
            <div class="field">
              <label for="fld-address">Юр. адрес <span class="req">*</span></label>
              <input id="fld-address" type="text" name="address" required />
            </div>
          </div>

          <h2>Базовый договор</h2>
          <div class="form-grid">
            <div class="field">
              <label for="fld-base_contract_no">Номер договора</label>
              <input id="fld-base_contract_no" type="text" name="base_contract_no" />
            </div>
            <div class="field">
              <label for="fld-base_contract_date">Дата договора</label>
              <input id="fld-base_contract_date" type="date" name="base_contract_date" />
            </div>
          </div>

          <div class="actions" style="margin-top:24px;">
            <button type="submit" class="btn btn-primary" id="save-btn">Сохранить</button>
          </div>
        </form>
      </div>
    </div>
  </main>
</div>
<script type="module" src="/static/js/shell.js"></script>
<script type="module" src="/static/js/profile.js"></script>
</body>
</html>
